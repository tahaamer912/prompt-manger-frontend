<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Templates - AI Prompt Manager</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/components/buttons.css">
  <link rel="stylesheet" href="../../css/components/cards.css">
  <link rel="stylesheet" href="../../css/components/forms.css">
  <link rel="stylesheet" href="../../css/components/tags.css">
  <link rel="stylesheet" href="../../css/components/toast.css">
  <link rel="stylesheet" href="../../css/components/pagination.css">
  <link rel="stylesheet" href="../../css/components/modal.css">
  <link rel="stylesheet" href="templates.css">
</head>
<body>

<div class="dashboard-layout">
  
  <div class="sidebar-container"></div>

  
  <div class="main-wrapper">
    <header class="dashboard-header">
      <div class="header-title">
        <h1>Prompt Templates</h1>
      </div>
      <div>
        <button onclick="openAddTemplateModal()" class="btn btn-primary">+ Add Template</button>
      </div>
    </header>
    
    <main class="content-area">
      <div class="content-container">
        
        <div style="margin-bottom: 24px;">
          <p style="font-size: 16px; margin-top: -10px;">Browse and use ready-made AI prompt templates</p>
        </div>

        <div class="search-wrapper" style="display: flex; justify-content: center; gap: 12px; align-items: center; width: 100%; flex-wrap: wrap; margin-bottom: 20px;">
          <input type="text" id="search" class="search-input" placeholder="Search templates..." oninput="filterTemplates()" style="flex: 1; min-width: 250px; max-width: 500px;">
          <select id="categoryFilter" class="form-control" onchange="filterTemplates()" style="width: auto; min-width: 160px; padding: 10px 16px;">
            <option value="">All Categories</option>
          </select>
        </div>

        
        <div style="margin-bottom: 16px;">
          <span style="font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">Filter by Tag:</span>
          <div id="tagsFilterContainer" class="filter-tags-list">
            
          </div>
        </div>
        
        <div id="templatesGrid" class="grid-container">
          
        </div>

        <div id="pagination" class="pagination"></div>
      </div>
    </main>
  </div>
</div>


<div id="addTemplateModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Add New Template</h3>
      <button class="modal-close" onclick="closeAddTemplateModal()">&times;</button>
    </div>
    <form id="addTemplateForm">
      <div class="form-group">
        <label for="templateTitle">Title</label>
        <input type="text" id="templateTitle" class="form-control" placeholder="e.g. SEO Blog Post Writer" required>
      </div>
      
      <div class="form-group">
        <label for="templateCategory">Category</label>
        <select id="templateCategory" class="form-control" required></select>
      </div>

      <div class="form-group">
        <label for="tagsInput">Tags (Press Enter to add)</label>
        <div class="tag-input-wrapper">
          <div id="modalTagsList" class="tags-container" style="margin-bottom: 8px;"></div>
          <input type="text" id="tagsInput" class="form-control" placeholder="Type tag and press Enter...">
        </div>
      </div>
      
      <div class="form-group">
        <label for="templatePrompt">Prompt Content</label>
        <textarea id="templatePrompt" class="form-control" placeholder="Paste your template here. Use square brackets like [Topic] for placeholders..." required></textarea>
      </div>
      
      <div class="mt-3">
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Template</button>
      </div>
    </form>
  </div>
</div>


<div id="useTemplateModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="useTemplateTitle">Use Template</h3>
      <button class="modal-close" onclick="closeUseTemplateModal()">&times;</button>
    </div>
    <div class="mb-2">
      <p id="useTemplateCategory" class="card-category" style="margin-bottom: 4px;"></p>
      <p id="useTemplateDesc" style="font-size: 14px; margin-bottom: 16px; color: var(--text-secondary);"></p>
    </div>
    
    
    <form id="useTemplateForm">
      <div id="placeholdersContainer" style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px;">
        
      </div>
      
      <div class="form-group">
        <label>Compiled Prompt Preview</label>
        <textarea id="compiledPromptText" class="form-control" style="min-height: 150px; background-color: var(--bg-input);" readonly></textarea>
      </div>
      
      <div style="display: flex; gap: 12px; margin-top: 24px;">
        <button type="button" onclick="copyCompiledPrompt()" class="btn btn-primary" style="flex: 1;">Copy Prompt</button>
        <button type="button" onclick="closeUseTemplateModal()" class="btn btn-secondary">Close</button>
      </div>
    </form>
  </div>
</div>

<script src="../../js/data/categories.js"></script>
<script src="../../js/data/prompts.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/components.js"></script>
<script src="templates.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Prompt App</title>
  <link rel="stylesheet" href="../../css/style.css">

</head>
<body class="auth-layout">

<div class="auth-container">
  <div class="auth-info">
    <h2>Join PromptApp</h2>
    <p>The smartest way to manage, organize and share your AI prompts.</p>
  </div>
  <div class="auth-card">
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Start your journey today for free</p>
    
    <form id="registerForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>
    
    <div class="auth-footer">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>
</div>

<script src="../../js/data/categories.js"></script>
<script src="../../js/data/prompts.js"></script>
<script src="../../js/utils.js"></script>
<script src="auth.js"></script>
</body>
</html>

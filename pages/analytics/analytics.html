<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - AI Prompt Manager</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/components/buttons.css">
  <link rel="stylesheet" href="../../css/components/cards.css">
  <link rel="stylesheet" href="../../css/components/forms.css">
  <link rel="stylesheet" href="../../css/components/tags.css">
  <link rel="stylesheet" href="../../css/components/toast.css">
  <link rel="stylesheet" href="../../css/components/pagination.css">
  <link rel="stylesheet" href="../../css/components/modal.css">
  <link rel="stylesheet" href="../../css/pages/analytics.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard-layout">
  <div class="sidebar-container"></div>

  <div class="main-wrapper">
    <header class="dashboard-header">
      <div class="header-title">
        <h1>Analytics</h1>
      </div>
    </header>
    
    <main class="content-area">
      <div class="content-container">
        
        <div class="stats-grid">
          <div class="card stat-card">
            <h3>Total Prompts</h3>
            <div id="statTotal" class="stat-number">0</div>
          </div>
          <div class="card stat-card">
            <h3>Public Prompts</h3>
            <div id="statPublic" class="stat-number">0</div>
          </div>
          <div class="card stat-card">
            <h3>Total Favorites</h3>
            <div id="statFav" class="stat-number">0</div>
          </div>
        </div>

        <div class="charts-grid">
          <div class="chart-card">
            <h3>Prompts by Category</h3>
            <canvas id="categoryChart"></canvas>
          </div>
          <div class="chart-card">
            <h3>Public vs Private</h3>
            <canvas id="publicPrivateChart"></canvas>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="../../js/data/categories.js"></script>
<script src="../../js/data/prompts.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/components.js"></script>
<script src="analytics.js"></script>
</body>
</html>

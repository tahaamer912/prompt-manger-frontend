<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Prompt App</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<div class="dashboard-layout">
  <div class="sidebar-container"></div>

  <div class="main-wrapper">
    <header class="dashboard-header">
      <div class="header-title">
        <h1>Account Settings</h1>
      </div>
    </header>
    
    <main class="content-area">
      <div class="content-container">
        <div class="form-card center-card">
          <form id="settingsForm">
            <h3 class="mb-2">Profile Information</h3>
            <div class="form-group">
              <label for="profileName">Full Name</label>
              <input type="text" id="profileName" class="form-control" placeholder="Your name">
            </div>
            
            <div class="form-group">
              <label for="profileEmail">Email Address</label>
              <input type="email" id="profileEmail" class="form-control" placeholder="Your email">
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 32px 0;">
            
            <h3 class="mb-2">Security</h3>
            <div class="form-group">
              <label for="profilePassword">New Password (leave blank to keep current)</label>
              <input type="password" id="profilePassword" class="form-control" placeholder="••••••••">
            </div>
            
            <div class="mt-3">
              <button type="submit" class="btn btn-primary" style="width: 100%;">Save Settings</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../../js/data/categories.js"></script>
<script src="../../js/data/prompts.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/components.js"></script>
<script src="settings.js"></script>
</body>
</html>
